scenario_events:
  - tick: 100
    type: price_shock
    parameters:
      stock: stock_a
      multiplier: 1.2

  - tick: 300
    type: sentiment_shock
    parameters:
      sentiment: 0.1

domain_config:
  stocks: [stock_a, stock_b, stock_c, stock_d, stock_e]
  price_impact_factor: 0.001
  sentiment_alpha: 0.1
  max_order_fraction: 0.1
